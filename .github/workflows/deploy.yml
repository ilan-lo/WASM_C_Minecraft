name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:   # allow manual trigger from GitHub UI

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14

      - name: Download dependencies
        run: |
          curl -sL https://raw.githubusercontent.com/nothings/stb/master/stb_image.h \
            -o voxel/lib/stb_image.h

      - name: Build web version
        run: |
          cd voxel
          make -f Makefile.web clean
          make -f Makefile.web
          echo "=== Build artifacts ==="
          ls -lh voxel.html voxel.js voxel.wasm voxel.data

      - name: Prepare GitHub Pages output
        run: |
          mkdir -p _site
          cp voxel/voxel.html  _site/index.html
          cp voxel/voxel.js    _site/
          cp voxel/voxel.wasm  _site/
          cp voxel/voxel.data  _site/
          python3 -c "
import re
with open('_site/index.html') as f:
    html = f.read()
html = re.sub(r'<a\b[^>]*>\s*<img\s+id=emscripten_logo[^>]*>\s*</a>', '', html)
with open('_site/index.html', 'w') as f:
    f.write(html)
print('Logo removed from index.html')
"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
